services:
  - type: web
    name: rag-notes-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: CHROMA_PATH
        value: /chroma_store
    disks:
      - name: chroma-store
        mountPath: /chroma_store
        sizeGB: 0.1
